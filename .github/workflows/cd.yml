name: CD

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        # v1.2.3 -> 1.2.3. Computed once here rather than inside the matrix job,
        # whose outputs are ambiguous when several parallel legs write the same key.
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

  build-and-push:
    name: Build & push ${{ matrix.service }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [controller, sut, worker, aggregator]
    steps:
      # v7 to match ci.yml; the rest of this repo is already on v7.
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/load-lab-${{ matrix.service }}:${{ needs.prepare.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/load-lab-${{ matrix.service }}:latest
          # Same cache scopes as ci.yml, so a tag build reuses layers the PR build
          # already produced instead of starting cold.
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy v${{ needs.prepare.outputs.version }}
    needs: [prepare, build-and-push]
    runs-on: ubuntu-latest
    # The approval gate. With `Required reviewers` configured on this environment,
    # every step below waits for an explicit human Approve in the Actions tab.
    # Free on public repositories — which this repo now is.
    environment:
      name: production
    steps:
      - uses: actions/checkout@v7

      # SCOPE, stated plainly: this cluster is created inside the runner and dies with
      # the job. It is a full rehearsal of the release — real published images, real
      # chart, real smoke test — not a deployment to anything lasting. Targeting a real
      # cluster means swapping this step for a kubeconfig secret; nothing else changes.
      - name: Create ephemeral kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: load-lab-cd

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Install KEDA
        # The chart renders a ScaledObject, and Helm cannot install a CRD instance
        # whose CRD does not exist yet — without this the release fails outright with
        # "no matches for kind ScaledObject in version keda.sh/v1alpha1".
        run: |
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update
          helm install keda kedacore/keda --namespace keda --create-namespace --wait

      - name: Create GHCR pull secret
        # The load-lab packages are private even though the repo is public — package
        # visibility is a separate setting. A fresh kind cluster therefore cannot pull
        # them anonymously. GITHUB_TOKEN can read this repository's own packages.
        # Delete this step if the packages are ever made public, and drop the
        # --set image.pullSecrets[0].name below with it.
        run: |
          kubectl create namespace load-lab
          kubectl create secret docker-registry ghcr \
            --namespace load-lab \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }}

      - name: Deploy load-lab chart
        # The exact version tag, never latest: a deployment has to be reproducible and
        # identifiable after the fact.
        run: |
          helm upgrade --install load-lab deploy/helm/load-lab \
            --namespace load-lab \
            --set image.owner=${{ github.repository_owner }} \
            --set image.tag=${{ needs.prepare.outputs.version }} \
            --set image.pullSecrets[0].name=ghcr \
            --atomic --wait --timeout 10m

      # Layer 1 (--atomic, above) is infrastructure health: if any pod fails to become
      # ready, Helm reverts the operation itself before the step even reports failure.
      # Layer 2 (below) is application correctness — the whole distributed path
      # controller -> Kafka -> worker -> SUT -> Kafka -> histogram merge. Readiness
      # probes cannot see that, which is exactly why this is not redundant with them.
      - name: Smoke test the deployed release
        id: smoke_test
        run: |
          set -euo pipefail
          kubectl port-forward -n load-lab svc/controller 8080:8080 &
          # Poll rather than sleep blindly: the forward is not usable the instant the
          # background process starts.
          for i in $(seq 1 30); do
            curl -sf localhost:8080/actuator/health >/dev/null && break
            sleep 2
          done

          RESPONSE=$(curl -sf -X POST localhost:8080/tests \
            -H "Content-Type: application/json" \
            -d '{"targetUrl":"http://sut:8081/simulate","virtualUsers":10,"durationSeconds":5}')
          TEST_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "Started test $TEST_ID"

          for i in $(seq 1 30); do
            STATUS=$(curl -sf "localhost:8080/tests/$TEST_ID/results" | jq -r '.status')
            echo "attempt $i: status=$STATUS"
            [ "$STATUS" = "DONE" ] && break
            sleep 2
          done

          RESULT=$(curl -sf "localhost:8080/tests/$TEST_ID/results")
          echo "Final result: $RESULT"

          # Not just "something finished" — that it finished CORRECTLY.
          # status: the run reached a terminal state at all.
          # totalRequests: catches the inverse failure — finished instantly because
          #   nothing actually generated traffic.
          # errors: catches pods that came up but cannot talk to each other (wrong env
          #   var, worker cannot reach Kafka or the SUT).
          # p99Ms: proves the HdrHistogram encode/merge path from Phase 4 ran, rather
          #   than a bare counter being incremented.
          echo "$RESULT" | jq -e '.status == "DONE"'
          echo "$RESULT" | jq -e '.totalRequests > 0'
          echo "$RESULT" | jq -e '.errors == 0'
          echo "$RESULT" | jq -e '.p99Ms > 0'

      - name: Roll back on failed smoke test
        # Scoped to this one step on purpose: a failure in `helm upgrade` has already
        # reverted itself via --atomic, and re-rolling-back on top of that would be
        # wrong. This fires only when the pods are healthy but the application is not.
        if: failure() && steps.smoke_test.outcome == 'failure'
        run: |
          echo "--- Release history BEFORE rollback ---"
          helm history load-lab -n load-lab

          # A rollback needs somewhere to roll back TO. On this ephemeral cluster every
          # run is a first install, so revision 1 is all there is and a bare
          # `helm rollback` dies with "Error: release has no 0 version" — masking the
          # real failure with a spurious one. On a persistent cluster the count is >= 2
          # and the rollback is the whole point, so branch rather than assume.
          REVISIONS=$(helm history load-lab -n load-lab -o json | jq 'length')
          if [ "$REVISIONS" -ge 2 ]; then
            helm rollback load-lab -n load-lab --wait --timeout 3m
            echo "--- Release history AFTER rollback ---"
            helm history load-lab -n load-lab
          else
            echo "Only revision 1 exists — this is a first install, so there is no
          previous release to return to. On a persistent cluster this branch would not
          be taken. Leaving the failed release in place for inspection."
          fi

          # Rollback restores the cluster; it must not launder the verdict. The run
          # stays red so the Actions history reads "this deployment failed".
          echo "::error::Smoke test failed after deployment — see rollback status above."
          exit 1

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -n load-lab -o wide
          kubectl describe pods -n load-lab | grep -B2 -A8 -iE 'events:' || true
          kubectl logs -n load-lab -l app=controller --tail=100 || true
