apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: load-lab
spec:
  # 1 replica is only the starting point — the ScaledObject owns this field at
  # runtime. Do not tune it here; KEDA will overwrite it.
  replicas: 1
  selector:
    matchLabels: { app: worker }
  template:
    metadata:
      labels: { app: worker }
    spec:
      containers:
        - name: worker
          image: ghcr.io/virael/load-lab-worker:latest
          # IfNotPresent, not the :latest default of Always: a local cluster
          # runs images side-loaded into its own daemon, and Always would make
          # it try (and fail) to pull them from a registry instead.
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 8082 }]
          env:
            - { name: KAFKA_BOOTSTRAP_SERVERS, value: "kafka:9092" }
          resources:
            # requests.cpu is mandatory for the CPU-based HPA in autoscaling/:
            # utilisation is a percentage OF THE REQUEST, not of the limit, so
            # without this field that HPA has no denominator and reports <unknown>.
            requests: { cpu: "200m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8082 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8082 }
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata: { name: worker, namespace: load-lab }
spec:
  selector: { app: worker }
  ports: [{ port: 8082, targetPort: 8082 }]
