apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: load-lab
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:17
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: "loadlab_control" }
            - { name: POSTGRES_USER, value: "loadlab" }
            - { name: POSTGRES_PASSWORD, value: "loadlab" }
            # The image refuses to initialise into a non-empty mount root, and an
            # emptyDir is mounted with a lost+found on some CSI drivers.
            - { name: PGDATA, value: "/var/lib/postgresql/data/pgdata" }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata: { name: postgres, namespace: load-lab }
spec:
  selector: { app: postgres }
  ports: [{ port: 5432, targetPort: 5432 }]
