name: load-lab

services:
  sut:
    build:
      context: ../services/sut
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  worker:
    build:
      context: ../services/worker
    ports:
      - "8082:8082"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  controller:
    build:
      context: ../services/controller
    ports:
      - "8080:8080"
    environment:
      WORKER_BASE_URL: http://worker:8082
    depends_on:
      worker:
        condition: service_healthy