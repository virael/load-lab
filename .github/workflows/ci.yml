name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (controller)
    runs-on: ubuntu-latest
    permissions:
      # Declaring `permissions` sets every unlisted scope to `none`.
      # `contents: read` is required for actions/checkout on a private repo.
      contents: read
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        working-directory: services/controller
        run: |
          chmod +x mvnw
          ./mvnw -B verify
      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report-controller
          path: services/controller/target/site/jacoco
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/services/controller/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage (controller)
          update-comment: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and (on main) push image
        uses: docker/build-push-action@v7
        with:
          context: services/controller
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/load-lab-controller:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/load-lab-controller:latest
          cache-from: type=gha,scope=controller
          cache-to: type=gha,mode=max,scope=controller

  sut:
    name: Backend (sut)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        working-directory: services/sut
        run: |
          chmod +x mvnw
          ./mvnw -B verify
      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report-sut
          path: services/sut/target/site/jacoco
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/services/sut/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage (sut)
          update-comment: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and (on main) push image
        uses: docker/build-push-action@v7
        with:
          context: services/sut
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/load-lab-sut:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/load-lab-sut:latest
          cache-from: type=gha,scope=sut
          cache-to: type=gha,mode=max,scope=sut

  worker:
    name: Backend (worker)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        working-directory: services/worker
        run: |
          chmod +x mvnw
          ./mvnw -B verify
      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report-worker
          path: services/worker/target/site/jacoco
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/services/worker/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage (worker)
          update-comment: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and (on main) push image
        uses: docker/build-push-action@v7
        with:
          context: services/worker
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/load-lab-worker:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/load-lab-worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  frontend:
    name: Frontend (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install, lint, build & test
        working-directory: web
        run: |
          npm ci
          npm run lint
          npm run build
          npm test -- --no-watch --no-progress
