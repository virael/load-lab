name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (controller)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test
        working-directory: services/controller
        run: |
          chmod +x mvnw
          ./mvnw -B verify

  sut:
    name: Backend (sut)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build & test
        working-directory: services/sut
        run: |
          chmod +x mvnw
          ./mvnw -B verify

  frontend:
    name: Frontend (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install, lint, build & test
        working-directory: web
        run: |
          npm ci
          npm run lint
          npm run build
          npm test -- --no-watch --no-progress
