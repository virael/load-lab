name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (controller)
    runs-on: ubuntu-latest
    permissions:
      # Declaring `permissions` sets every unlisted scope to `none`.
      # `contents: read` is required for actions/checkout on a private repo.
      contents: read
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        working-directory: services/controller
        run: |
          chmod +x mvnw
          ./mvnw -B verify
      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report-controller
          path: services/controller/target/site/jacoco
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/services/controller/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage (controller)
          update-comment: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and (on main) push image
        uses: docker/build-push-action@v7
        with:
          context: services/controller
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/load-lab-controller:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/load-lab-controller:latest
          cache-from: type=gha,scope=controller
          cache-to: type=gha,mode=max,scope=controller

  sut:
    name: Backend (sut)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        working-directory: services/sut
        run: |
          chmod +x mvnw
          ./mvnw -B verify
      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report-sut
          path: services/sut/target/site/jacoco
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/services/sut/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage (sut)
          update-comment: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and (on main) push image
        uses: docker/build-push-action@v7
        with:
          context: services/sut
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/load-lab-sut:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/load-lab-sut:latest
          cache-from: type=gha,scope=sut
          cache-to: type=gha,mode=max,scope=sut

  worker:
    name: Backend (worker)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        working-directory: services/worker
        run: |
          chmod +x mvnw
          ./mvnw -B verify
      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report-worker
          path: services/worker/target/site/jacoco
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/services/worker/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage (worker)
          update-comment: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and (on main) push image
        uses: docker/build-push-action@v7
        with:
          context: services/worker
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/load-lab-worker:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/load-lab-worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  aggregator:
    name: Backend (aggregator)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test
        working-directory: services/aggregator
        run: |
          chmod +x mvnw
          ./mvnw -B verify
      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report-aggregator
          path: services/aggregator/target/site/jacoco
      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/services/aggregator/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Code Coverage (aggregator)
          update-comment: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and (on main) push image
        uses: docker/build-push-action@v7
        with:
          context: services/aggregator
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/load-lab-aggregator:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/load-lab-aggregator:latest
          cache-from: type=gha,scope=aggregator
          cache-to: type=gha,mode=max,scope=aggregator

  frontend:
    name: Frontend (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Node 22
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install, lint, build & test
        working-directory: web
        run: |
          npm ci
          npm run lint
          npm run build
          npm test -- --no-watch --no-progress

  compose-integration:
    name: Compose integration (multi-worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # docker/build-push-action exports these behind the scenes; a bare
      # `docker compose build` does not, so type=gha would silently no-op.
      - name: Expose GitHub Actions cache variables
        uses: crazy-max/ghaction-github-runtime@v3

      # The default `docker` driver ignores type=gha without erroring. Only the
      # docker-container driver actually honours it.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build stack (cached)
        working-directory: deploy
        run: docker compose build

      - name: Start stack with 3 workers
        working-directory: deploy
        run: docker compose up -d --scale worker=3 --wait

      - name: Smoke test — load test across the real multi-worker stack
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sf -X POST localhost:8080/tests \
            -H "Content-Type: application/json" \
            -d '{"targetUrl":"http://sut:8081/simulate","virtualUsers":15,"durationSeconds":5}')
          TEST_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "Started test $TEST_ID"

          for i in $(seq 1 30); do
            STATUS=$(curl -sf "localhost:8080/tests/$TEST_ID/results" | jq -r '.status')
            echo "attempt $i: status=$STATUS"
            [ "$STATUS" = "DONE" ] && break
            sleep 2
          done

          RESULT=$(curl -sf "localhost:8080/tests/$TEST_ID/results")
          echo "Final result: $RESULT"
          echo "$RESULT" | jq -e '.status == "DONE"'
          echo "$RESULT" | jq -e '.totalRequests > 0'
          echo "$RESULT" | jq -e '.errors == 0'

      - name: Dump logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose logs

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose down -v

  helm-lint:
    name: Helm chart lint
    runs-on: ubuntu-latest
    steps:
      # v7 to match every other job in this file, not the v4 the step notes suggested.
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint deploy/helm/load-lab

      # Rendering goes further than lint: it executes the range/if logic, so a
      # reference to a values key that does not exist fails here rather than on a
      # real cluster.
      - name: Render chart (catches template errors)
        run: helm template load-lab deploy/helm/load-lab --set image.owner=ci-placeholder

      - name: Render chart with CPU HPA instead of KEDA (alternate config)
        run: |
          helm template load-lab deploy/helm/load-lab \
            --set image.owner=ci-placeholder \
            --set autoscaling.cpuHpa.enabled=true \
            --set autoscaling.keda.enabled=false

      # The two scalers must never both render: they would fight over spec.replicas
      # on the worker Deployment. Asserting the chart REFUSES this combination keeps
      # the guard from silently rotting away.
      - name: Reject both autoscalers enabled at once
        run: |
          if helm template load-lab deploy/helm/load-lab \
               --set image.owner=ci-placeholder \
               --set autoscaling.cpuHpa.enabled=true >/dev/null 2>&1; then
            echo "::error::chart rendered with both autoscalers enabled; the mutual-exclusion guard is broken"
            exit 1
          fi
          echo "guard held: chart refused to render both autoscalers"
