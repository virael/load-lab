apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  labels: { app: kafka }
spec:
  replicas: 1
  selector:
    matchLabels: { app: kafka }
  template:
    metadata:
      labels: { app: kafka }
    spec:
      containers:
        - name: kafka
          image: {{ .Values.kafka.image }}
          ports:
            - { containerPort: 9092, name: plaintext }
            - { containerPort: 9093, name: controller }
          env:
            - { name: KAFKA_NODE_ID, value: "1" }
            - { name: KAFKA_PROCESS_ROLES, value: "broker,controller" }
            - { name: KAFKA_LISTENERS, value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093" }
            # Fully qualified on purpose. A client first dials bootstrapServers, then
            # reconnects to whatever the broker ADVERTISES — so a short name works for
            # pods in this namespace but breaks the KEDA operator, which runs in the
            # keda namespace and cannot resolve it.
            - { name: KAFKA_ADVERTISED_LISTENERS, value: "PLAINTEXT://kafka.{{ .Release.Namespace }}.svc.cluster.local:9092" }
            - { name: KAFKA_CONTROLLER_LISTENER_NAMES, value: "CONTROLLER" }
            - { name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP, value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT" }
            - { name: KAFKA_CONTROLLER_QUORUM_VOTERS, value: "1@kafka:9093" }
            - { name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR, value: "1" }
            - { name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR, value: "1" }
            - { name: KAFKA_NUM_PARTITIONS, value: {{ .Values.kafka.numPartitions | quote }} }
            # Without this the image writes to /tmp/kraft-combined-logs and the mount
            # below is silently unused.
            - { name: KAFKA_LOG_DIRS, value: "/var/lib/kafka/data" }
          volumeMounts: [{ name: data, mountPath: /var/lib/kafka/data }]
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kafka-data
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
spec:
  selector: { app: kafka }
  ports:
    - { name: plaintext, port: 9092, targetPort: 9092 }
    # 9093 must be published too. KAFKA_CONTROLLER_QUORUM_VOTERS points at kafka:9093,
    # and in compose that name resolves straight to the container, so one port was
    # enough. Through a Service only declared ports are forwarded — without this the
    # broker cannot reach its own controller quorum and crash-loops.
    - { name: controller, port: 9093, targetPort: 9093 }
---
# Real persistence: KRaft metadata and the commit log must survive a restart, or
# the broker comes back with no topics and every consumer offset lost. Binds
# against the kind cluster's default local-path StorageClass (see postgres.yaml).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
