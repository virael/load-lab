spring.application.name=controller
# Pinned explicitly like the other three services (sut/worker/aggregator) rather than
# relying on the framework default, so the port lives in one obvious place.
server.port=8080
worker.base-url=${WORKER_BASE_URL:http://localhost:8082}

# How many sub-runs a test is split into: ceil(virtualUsers / capacity), capped.
# max-workers-per-test must be kept in sync BY HAND with maxReplicaCount in
# deploy/helm/load-lab/templates/worker-scaledobject.yaml — the two live in different worlds.
loadtest.worker-capacity-vus=5000
loadtest.max-workers-per-test=20

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Controller owns its own PostgreSQL (database-per-service): relational test-run
# records, separate from the aggregator's TimescaleDB time series.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/loadlab_control}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:loadlab}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:loadlab}
spring.flyway.locations=classpath:db/migration

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# latest: metrics are frequently-refreshed snapshots, not one-off orders. On
# restart the controller should listen from now on, not replay every test ever run.
spring.kafka.consumer.group-id=controller-group
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.loadlab.controller
spring.kafka.consumer.properties.spring.json.value.default.type=com.loadlab.controller.TestResult
spring.kafka.consumer.properties.spring.json.use.type.headers=false
