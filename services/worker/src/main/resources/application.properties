spring.application.name=worker
server.port=8082

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JacksonJsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# earliest: a command published while the worker was down must still be picked up
# when it comes back. That durability is the whole point of the queue.
spring.kafka.consumer.group-id=worker-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.loadlab.worker
spring.kafka.consumer.properties.spring.json.value.default.type=com.loadlab.worker.RunCommand
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Manual acknowledgement: the offset is committed only after the run actually
# finishes (see RunExecutorService.startRun), not on command receipt. Otherwise
# the consumer lag KEDA scales on would drop to zero the instant a command is
# accepted, long before the generated traffic is done.
spring.kafka.listener.ack-mode=manual

# The reactive load generator's resource ceiling: how many HTTP requests may be
# in flight at once. Replaces the old thread-per-VU model, where the ceiling was
# the OS thread count. Sized above the declared production capacity
# (loadtest.worker-capacity-vus=5000) so the pool never silently throttles a
# fully loaded worker.
webclient.max-connections=6000
