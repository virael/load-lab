apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb
  labels: { app: timescaledb }
spec:
  replicas: 1
  selector:
    matchLabels: { app: timescaledb }
  template:
    metadata:
      labels: { app: timescaledb }
    spec:
      containers:
        - name: timescaledb
          image: {{ .Values.timescaledb.image }}
          ports: [{ containerPort: 5432 }]
          env:
            - { name: POSTGRES_DB, value: {{ .Values.timescaledb.database | quote }} }
            - { name: POSTGRES_USER, value: {{ .Values.database.username | quote }} }
            - { name: POSTGRES_PASSWORD, value: {{ .Values.database.password | quote }} }
            - { name: PGDATA, value: "/var/lib/postgresql/data/pgdata" }
          volumeMounts: [{ name: data, mountPath: /var/lib/postgresql/data }]
      volumes: [{ name: data, emptyDir: {} }]
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
spec:
  selector: { app: timescaledb }
  ports: [{ port: 5432, targetPort: 5432 }]
