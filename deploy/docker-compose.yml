name: load-lab

services:
  sut:
    build:
      context: ../services/sut
      # type=gha is a no-op unless the build runs on a docker-container builder AND
      # the GitHub Actions cache env vars are exposed. The default docker driver
      # ignores it silently — no error, just no caching. Scopes match the ones the
      # per-service CI jobs already use, so the cache is shared between them.
      cache_from:
        - type=gha,scope=sut
      cache_to:
        - type=gha,mode=max,scope=sut
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # No host port mapping: `--scale worker=3` cannot bind the same port three times,
  # and nothing outside the compose network needs to reach a worker directly.
  worker:
    build:
      context: ../services/worker
      cache_from:
        - type=gha,scope=worker
      cache_to:
        - type=gha,mode=max,scope=worker
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  kafka:
    image: apache/kafka:4.2.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # Partitions are the hard ceiling on parallelism within a consumer group: with
      # 1, only one worker ever receives anything no matter how many you scale to.
      # NOTE: this only applies to topics created from now on. An existing
      # test-commands stays at its old partition count until the volume is wiped.
      KAFKA_NUM_PARTITIONS: 6
      # The image defaults to /tmp/kraft-combined-logs; without this the volume
      # below mounts but the broker never writes to it.
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  controller:
    build:
      context: ../services/controller
      cache_from:
        - type=gha,scope=controller
      cache_to:
        - type=gha,mode=max,scope=controller
    ports:
      - "8080:8080"
    environment:
      WORKER_BASE_URL: http://worker:8082
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/loadlab_control
      SPRING_DATASOURCE_USERNAME: loadlab
      SPRING_DATASOURCE_PASSWORD: loadlab
    depends_on:
      worker:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  aggregator:
    build:
      context: ../services/aggregator
      cache_from:
        - type=gha,scope=aggregator
      cache_to:
        - type=gha,mode=max,scope=aggregator
    ports:
      - "8083:8083"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://timescaledb:5432/loadlab
      SPRING_DATASOURCE_USERNAME: loadlab
      SPRING_DATASOURCE_PASSWORD: loadlab
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  timescaledb:
    image: timescale/timescaledb:2.18.0-pg17
    environment:
      POSTGRES_DB: loadlab
      POSTGRES_USER: loadlab
      POSTGRES_PASSWORD: loadlab
    volumes:
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loadlab -d loadlab"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Controller's own database (database-per-service): plain Postgres for relational
  # test-run records, separate instance from the aggregator's TimescaleDB.
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: loadlab_control
      POSTGRES_USER: loadlab
      POSTGRES_PASSWORD: loadlab
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loadlab -d loadlab_control"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  kafka-data:
  timescale-data:
  postgres-data: