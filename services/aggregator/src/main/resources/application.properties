spring.application.name=aggregator
server.port=8083

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Same relaxed-binding pattern as WORKER_BASE_URL: localhost default for a local
# run, overridden to the service address in compose.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/loadlab}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:loadlab}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:loadlab}
spring.flyway.locations=classpath:db/migration

# latest, same reasoning as the controller: on restart the aggregator listens from
# now on rather than replaying every test ever recorded on this topic.
spring.kafka.consumer.group-id=aggregator-group
spring.kafka.consumer.auto-offset-reset=latest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.loadlab.aggregator
spring.kafka.consumer.properties.spring.json.value.default.type=com.loadlab.aggregator.TestResult
spring.kafka.consumer.properties.spring.json.use.type.headers=false
